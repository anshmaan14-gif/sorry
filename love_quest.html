<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Love Quest for ANSHU ❤️</title>
<style>
  :root {
    --bg1: #ff758c;
    --bg2: #ff7eb3;
    --card: rgba(255,255,255,0.14);
    --text: #fff;
    --yes: #35c759;
    --no: #ff4d4d;
    --shadow: rgba(0,0,0,0.18);
  }

  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: "Segoe UI", Arial, sans-serif;
    min-height: 100vh;
    overflow: hidden;
    background: linear-gradient(135deg, var(--bg1), var(--bg2));
    color: var(--text);
    display: grid;
    place-items: center;
    touch-action: manipulation;
  }

  .bg-hearts {
    position: fixed;
    inset: 0;
    pointer-events: none;
    overflow: hidden;
  }

  .float-heart {
    position: absolute;
    bottom: -40px;
    font-size: 18px;
    opacity: 0.8;
    animation: floatUp linear forwards;
    filter: drop-shadow(0 4px 8px rgba(0,0,0,0.15));
  }

  @keyframes floatUp {
    from { transform: translateY(0) scale(1); opacity: 0.9; }
    to   { transform: translateY(-110vh) scale(1.6); opacity: 0; }
  }

  .game {
    width: min(92vw, 560px);
    padding: 22px;
    border-radius: 28px;
    background: var(--card);
    box-shadow: 0 18px 50px var(--shadow);
    backdrop-filter: blur(10px);
    text-align: center;
    position: relative;
  }

  .topbar {
    display: flex;
    justify-content: space-between;
    gap: 10px;
    margin-bottom: 16px;
    font-weight: 700;
    font-size: 0.95rem;
    opacity: 0.95;
  }

  .pill {
    padding: 8px 12px;
    border-radius: 999px;
    background: rgba(255,255,255,0.16);
  }

  h1 {
    margin: 10px 0 8px;
    font-size: clamp(2rem, 5vw, 3rem);
    line-height: 1.08;
  }

  p {
    margin: 0 auto 16px;
    max-width: 36ch;
    font-size: 1.03rem;
    opacity: 0.96;
  }

  .buttons {
    position: relative;
    min-height: 110px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 14px;
    flex-wrap: wrap;
    margin-top: 10px;
  }

  button {
    border: 0;
    border-radius: 16px;
    padding: 13px 22px;
    font-size: 1.05rem;
    font-weight: 800;
    cursor: pointer;
    transition: transform .15s ease, box-shadow .15s ease, opacity .2s ease;
    box-shadow: 0 10px 24px rgba(0,0,0,0.15);
  }

  button:active { transform: scale(0.96); }

  .yes {
    background: var(--yes);
    color: white;
  }

  .no {
    background: var(--no);
    color: white;
    position: absolute;
  }

  .start {
    background: white;
    color: #ff4d88;
  }

  .tiny {
    font-size: 0.92rem;
    opacity: 0.9;
    margin-top: 10px;
  }

  .hidden { display: none !important; }

  .stage {
    min-height: 250px;
    display: grid;
    place-items: center;
  }

  .emoji {
    font-size: clamp(3rem, 8vw, 5rem);
    margin: 8px 0;
  }

  .party {
    animation: pop .55s ease;
  }

  @keyframes pop {
    0% { transform: scale(0.5); opacity: 0; }
    100% { transform: scale(1); opacity: 1; }
  }

  .progress {
    height: 10px;
    border-radius: 999px;
    background: rgba(255,255,255,0.18);
    overflow: hidden;
    margin: 14px 0 4px;
  }

  .progress > div {
    height: 100%;
    width: 0%;
    border-radius: inherit;
    background: linear-gradient(90deg, #fff, #ffe27a, #fff);
    transition: width .35s ease;
  }

  .footer-note {
    margin-top: 12px;
    font-size: 0.9rem;
    opacity: 0.85;
  }

  .confetti {
    position: fixed;
    top: -12px;
    width: 10px;
    height: 14px;
    border-radius: 3px;
    pointer-events: none;
    animation: fall linear forwards;
  }

  @keyframes fall {
    to { transform: translateY(110vh) rotate(720deg); opacity: 0; }
  }

  .shake {
    animation: shake .35s ease;
  }

  @keyframes shake {
    0%,100% { transform: translateX(0); }
    20% { transform: translateX(-6px); }
    40% { transform: translateX(6px); }
    60% { transform: translateX(-4px); }
    80% { transform: translateX(4px); }
  }
</style>
</head>
<body>
  <div class="bg-hearts" id="bgHearts"></div>

  <div class="game" id="game">
    <div class="topbar">
      <div class="pill">Love Points: <span id="points">0</span> 💖</div>
      <div class="pill">Level: <span id="level">0</span>/3</div>
    </div>

    <div class="stage" id="stage">
      <div>
        <h1>Love Quest for ANSHU ❤️</h1>
        <p>Answer the questions, catch the love, and try to keep the No button from escaping 😄</p>
        <button class="start" id="startBtn">Start Game</button>
        <div class="tiny">Tip: on mobile, tap the No button to make it run away.</div>
      </div>
    </div>

    <div class="progress hidden" id="progressWrap">
      <div id="progressBar"></div>
    </div>

    <div class="footer-note" id="footerNote"></div>
  </div>

<script>
  const stage = document.getElementById("stage");
  const startBtn = document.getElementById("startBtn");
  const pointsEl = document.getElementById("points");
  const levelEl = document.getElementById("level");
  const progressWrap = document.getElementById("progressWrap");
  const progressBar = document.getElementById("progressBar");
  const footerNote = document.getElementById("footerNote");

  let points = 0;
  let level = 0;
  let noBtn = null;
  let noBtn2 = null;

  function setProgress() {
    const pct = (level / 3) * 100;
    progressBar.style.width = pct + "%";
  }

  function updateHud() {
    pointsEl.textContent = points;
    levelEl.textContent = level;
    setProgress();
  }

  function showConfetti(count = 80) {
    for (let i = 0; i < count; i++) {
      const c = document.createElement("div");
      c.className = "confetti";
      c.style.left = Math.random() * 100 + "vw";
      c.style.background = `hsl(${Math.floor(Math.random() * 360)}, 100%, 60%)`;
      c.style.animationDuration = (1.8 + Math.random() * 1.8) + "s";
      c.style.transform = `translateY(0) rotate(${Math.random() * 360}deg)`;
      document.body.appendChild(c);
      setTimeout(() => c.remove(), 4000);
    }
  }

  function spawnFloatingHearts() {
    const wrap = document.getElementById("bgHearts");
    setInterval(() => {
      const h = document.createElement("div");
      h.className = "float-heart";
      h.textContent = ["💖","💘","💗","❤️","💞"][Math.floor(Math.random() * 5)];
      h.style.left = Math.random() * 100 + "vw";
      h.style.animationDuration = (4 + Math.random() * 4) + "s";
      h.style.fontSize = (16 + Math.random() * 18) + "px";
      wrap.appendChild(h);
      setTimeout(() => h.remove(), 8500);
    }, 250);
  }

  function moveNoButton(btn) {
    if (!btn) return;
    const maxX = window.innerWidth - 120;
    const maxY = window.innerHeight - 80;
    const x = Math.max(10, Math.floor(Math.random() * maxX));
    const y = Math.max(10, Math.floor(Math.random() * maxY));
    btn.style.left = x + "px";
    btn.style.top = y + "px";
  }

  function bindNoButton(btn) {
    btn.addEventListener("mouseenter", () => moveNoButton(btn));
    btn.addEventListener("touchstart", (e) => {
      e.preventDefault();
      moveNoButton(btn);
    }, { passive: false });
    btn.addEventListener("click", () => {
      moveNoButton(btn);
      gameShake();
      footerNote.textContent = "Nice try 😏";
    });
  }

  function gameShake() {
    const game = document.getElementById("game");
    game.classList.remove("shake");
    void game.offsetWidth;
    game.classList.add("shake");
  }

  function renderForgiveScreen() {
    level = 1;
    updateHud();
    progressWrap.classList.remove("hidden");
    footerNote.textContent = "";

    stage.innerHTML = `
      <div>
        <div class="emoji party">🥺❤️</div>
        <h1>Do you forgive me, ANSHU?</h1>
        <p>I made a tiny game because sorry is better when it comes with effort.</p>
        <div class="buttons" id="btnArea">
          <button class="yes" id="yes1">Yes ❤️</button>
          <button class="no" id="no1">No 😈</button>
        </div>
      </div>
    `;

    const yes1 = document.getElementById("yes1");
    noBtn = document.getElementById("no1");
    bindNoButton(noBtn);

    yes1.addEventListener("click", () => {
      points += 1;
      updateHud();
      showConfetti(100);
      stage.innerHTML = `
        <div class="party">
          <div class="emoji">🎉💖🎉</div>
          <h1>I knew you would forgive me, ANSHU</h1>
          <p>Wait for it...</p>
        </div>
      `;

      setTimeout(() => {
        stage.innerHTML = `
          <div class="party">
            <div class="emoji">⏳🥺</div>
            <h1>Wait...</h1>
          </div>
        `;
      }, 3000);

      setTimeout(() => renderLoveQuestion(), 5000);
    });
  }

  function renderLoveQuestion() {
    level = 2;
    points += 1;
    updateHud();
    setProgress();
    footerNote.textContent = "";

    stage.innerHTML = `
      <div>
        <div class="emoji party">😍</div>
        <h1>You love me na, ANSHU?</h1>
        <p>Be honest... but the No button is going to be very dramatic.</p>
        <div class="buttons">
          <button class="yes" id="yes2">Yes 💕</button>
          <button class="no" id="no2">No 🙃</button>
        </div>
      </div>
    `;

    const yes2 = document.getElementById("yes2");
    noBtn2 = document.getElementById("no2");
    bindNoButton(noBtn2);

    yes2.addEventListener("click", () => {
      points += 1;
      level = 3;
      updateHud();
      showConfetti(130);

      stage.innerHTML = `
        <div class="party">
          <div class="emoji">💘🎊💘</div>
          <h1>Yayyy! I love you too, ANSHU ❤️</h1>
          <p>Game complete. You won my heart again.</p>
          <div style="margin-top:16px;">
            <button class="start" id="replayBtn">Play Again</button>
          </div>
        </div>
      `;

      document.getElementById("replayBtn").addEventListener("click", () => {
        points = 0;
        level = 0;
        updateHud();
        renderForgiveScreen();
      });
    });
  }

  startBtn.addEventListener("click", () => {
    spawnFloatingHearts();
    renderForgiveScreen();
    showConfetti(40);
  });
</script>
</body>
</html>
