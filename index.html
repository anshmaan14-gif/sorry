<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Love Quest for ANSHU ❤️</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #ff758c, #ff7eb3);
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  overflow: hidden;
}

.game {
  text-align: center;
  width: 90%;
  max-width: 500px;
}

button {
  padding: 12px 20px;
  margin: 10px;
  border: none;
  border-radius: 10px;
  font-size: 18px;
  cursor: pointer;
}

.yes { background: #4CAF50; color: white; }
.no { background: #ff4d4d; color: white; position: absolute; }

.heart {
  position: absolute;
  font-size: 24px;
  cursor: pointer;
}

</style>
</head>

<body>

<div class="game" id="game">
  <h1>Love Quest for ANSHU ❤️</h1>
  <button onclick="startGame()">Start</button>
</div>

<script>
let score = 0;
let timeLeft = 5;
let gameInterval;

// start
function startGame() {
  document.getElementById("game").innerHTML = `
    <h2>Do you forgive me ANSHU? 🥺</h2>
    <button class="yes" onclick="forgiveYes()">Yes ❤️</button>
    <button class="no" id="noBtn">No 😈</button>
  `;

  moveNo("noBtn");
}

// move NO button
function moveNo(id) {
  const btn = document.getElementById(id);
  btn.addEventListener("mouseover", () => {
    btn.style.left = Math.random()*80 + "%";
    btn.style.top = Math.random()*80 + "%";
  });
}

// yes clicked
function forgiveYes() {
  document.getElementById("game").innerHTML = `
    <h2>🎉 I knew it ❤️</h2>
  `;

  setTimeout(loveQuestion, 2000);
}

// second question
function loveQuestion() {
  document.getElementById("game").innerHTML = `
    <h2>You love me na? 😚</h2>
    <button class="yes" onclick="startMiniGame()">Yes 💕</button>
    <button class="no" id="noBtn2">No 😏</button>
  `;

  moveNo("noBtn2");
}

// MINI HARD GAME
function startMiniGame() {
  score = 0;
  timeLeft = 5;

  document.getElementById("game").innerHTML = `
    <h2>Catch 5 hearts in 5 seconds 💖</h2>
    <h3 id="score">Score: 0</h3>
    <h3 id="timer">Time: 5</h3>
  `;

  gameInterval = setInterval(updateGame, 1000);
  spawnHeart();
}

// update timer
function updateGame() {
  timeLeft--;
  document.getElementById("timer").innerText = "Time: " + timeLeft;

  if (timeLeft <= 0) {
    clearInterval(gameInterval);
    endGame();
  }
}

// spawn moving hearts
function spawnHeart() {
  const heart = document.createElement("div");
  heart.className = "heart";
  heart.innerText = "💖";

  heart.style.left = Math.random()*90 + "%";
  heart.style.top = Math.random()*90 + "%";

  document.body.appendChild(heart);

  // move randomly
  let move = setInterval(() => {
    heart.style.left = Math.random()*90 + "%";
    heart.style.top = Math.random()*90 + "%";
  }, 500);

  heart.onclick = () => {
    score++;
    document.getElementById("score").innerText = "Score: " + score;
    heart.remove();
    clearInterval(move);

    if (score >= 5) {
      clearInterval(gameInterval);
      endGame(true);
    } else {
      spawnHeart();
    }
  };
}

// end game
function endGame(win=false) {
  document.querySelectorAll(".heart").forEach(h => h.remove());

  if (win) {
    document.getElementById("game").innerHTML = `
      <h1>💖 YOU WIN 💖</h1>
      <h2>I love you so much ANSHU 🥹❤️</h2>
    `;
  } else {
    document.getElementById("game").innerHTML = `
      <h2>😢 Try again na...</h2>
      <button onclick="startMiniGame()">Retry 💕</button>
    `;
  }
}
</script>

</body>
</html>
