<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sorry ❤️</title>
<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: linear-gradient(135deg, #ff9a9e, #fad0c4);
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        text-align: center;
        overflow: hidden;
    }

    .container {
        position: relative;
    }

    h1 {
        color: #fff;
        font-size: 2.5em;
    }

    button {
        padding: 12px 25px;
        margin: 10px;
        font-size: 18px;
        border: none;
        border-radius: 10px;
        cursor: pointer;
        transition: 0.3s;
    }

    .yes {
        background: #4CAF50;
        color: white;
    }

    .no {
        background: #f44336;
        color: white;
        position: absolute;
    }

    .hidden {
        display: none;
    }

    .emoji {
        font-size: 3em;
    }
</style>
</head>
<body>

<div class="container" id="main">
    <h1 id="question">Do you forgive me? 🥺</h1>
    <button class="yes" onclick="yesClicked()">Yes ❤️</button>
    <button class="no" id="noBtn">No 😈</button>
</div>

<script>
const noBtn = document.getElementById("noBtn");
const container = document.getElementById("main");

// Move NO button randomly
noBtn.addEventListener("mouseover", () => {
    const x = Math.random() * (window.innerWidth - 100);
    const y = Math.random() * (window.innerHeight - 50);
    noBtn.style.left = x + "px";
    noBtn.style.top = y + "px";
});

// YES button logic
function yesClicked() {
    container.innerHTML = `
        <h1>🎉🎉🎉</h1>
        <h1>I knew you love me ❤️🥹</h1>
    `;

    // after 3 sec -> wait page
    setTimeout(() => {
        container.innerHTML = `
            <h1 class="emoji">⏳🥺</h1>
            <h1>Wait...</h1>
        `;
    }, 3000);

    // after 5 sec -> second question
    setTimeout(() => {
        container.innerHTML = `
            <h1>You love me na? 😚</h1>
            <button class="yes" onclick="finalYes()">Yes 💕</button>
            <button class="no" id="noBtn2">No 😏</button>
        `;

        const noBtn2 = document.getElementById("noBtn2");

        noBtn2.addEventListener("mouseover", () => {
            const x = Math.random() * (window.innerWidth - 100);
            const y = Math.random() * (window.innerHeight - 50);
            noBtn2.style.left = x + "px";
            noBtn2.style.top = y + "px";
        });

    }, 5000);
}

// Final YES
function finalYes() {
    container.innerHTML = `
        <h1>Yayyyy!!! 💖💖💖</h1>
        <h1>I love you so much 🥹❤️</h1>
    `;
}
</script>

</body>
</html>
