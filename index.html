<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sorry Anshu ❤️</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #ff758c, #ff7eb3);
    overflow: hidden;
    text-align: center;
    color: white;
}

h1 {
    margin-top: 20px;
}

button {
    padding: 10px 20px;
    font-size: 18px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
}

.yes { background: #4CAF50; }
.no { background: #ff4d4d; position: absolute; }

#gameArea {
    position: relative;
    width: 100%;
    height: 80vh;
}

.heart {
    position: absolute;
    font-size: 25px;
    cursor: pointer;
}

#score {
    font-size: 20px;
}
</style>
</head>

<body>

<h1 id="title">Anshu 🥺 Do you forgive me?</h1>
<div id="score">Love Points: 0 💖</div>

<button class="yes" onclick="startGame()">Yes ❤️</button>
<button class="no" id="noBtn">No 😈</button>

<div id="gameArea"></div>

<audio id="music" loop>
<source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3">
</audio>

<script>
let score = 0;
let gameRunning = false;

const noBtn = document.getElementById("noBtn");

// NO button runs away
noBtn.addEventListener("mouseover", () => {
    noBtn.style.left = Math.random()*90 + "vw";
    noBtn.style.top = Math.random()*80 + "vh";
});

// Start mini game
function startGame() {
    document.getElementById("music").play();
    document.getElementById("title").innerText = "Catch hearts to prove you love me 💖";
    gameRunning = true;

    spawnHearts();
}

// Spawn hearts
function spawnHearts() {
    if (!gameRunning) return;

    const heart = document.createElement("div");
    heart.className = "heart";
    heart.innerHTML = "💖";

    heart.style.left = Math.random()*90 + "vw";
    heart.style.top = Math.random()*80 + "vh";

    heart.onclick = () => {
        score++;
        document.getElementById("score").innerText = "Love Points: " + score + " 💖";
        heart.remove();

        if (score >= 10) winGame();
    };

    document.getElementById("gameArea").appendChild(heart);

    setTimeout(() => heart.remove(), 2000);
    setTimeout(spawnHearts, 700);
}

// Win condition
function winGame() {
    gameRunning = false;
    document.body.innerHTML = `
        <h1>🎉🎉🎉</h1>
        <h1>I knew you love me Anshu ❤️🥹</h1>
        <h2>I'm really sorry for everything 💔</h2>
    `;

    setTimeout(() => {
        document.body.innerHTML = `
            <h1>⏳🥺 Wait...</h1>
        `;
    }, 3000);

    setTimeout(() => {
        document.body.innerHTML = `
            <h1>Anshu, you love me na? 😚</h1>
            <button onclick="finalYes()">Yes 💕</button>
            <button id="no2" style="position:absolute;">No 😏</button>
        `;

        const no2 = document.getElementById("no2");

        no2.addEventListener("mouseover", () => {
            no2.style.left = Math.random()*90 + "vw";
            no2.style.top = Math.random()*80 + "vh";
        });

    }, 5000);
}

// Final yes
function finalYes() {
    document.body.innerHTML = `
        <h1>YAYYY ❤️❤️❤️</h1>
        <h1>I LOVE YOU ANSHU 🥹💖</h1>
    `;
}
</script>

</body>
</html>
