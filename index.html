<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sorry ❤️</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #ff758c, #ff7eb3);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    text-align: center;
    overflow: hidden;
    color: white;
}

.container {
    position: relative;
    padding: 20px;
}

h1 {
    font-size: 2.2em;
}

button {
    padding: 12px 25px;
    margin: 10px;
    font-size: 18px;
    border: none;
    border-radius: 12px;
    cursor: pointer;
}

.yes {
    background: #4CAF50;
    color: white;
}

.no {
    background: #ff4d4d;
    color: white;
    position: absolute;
}

/* Floating hearts */
.heart {
    position: absolute;
    color: pink;
    animation: floatUp 5s linear infinite;
}

@keyframes floatUp {
    0% { transform: translateY(0); opacity: 1; }
    100% { transform: translateY(-800px); opacity: 0; }
}

/* Confetti */
.confetti {
    position: fixed;
    width: 10px;
    height: 10px;
    background: white;
    top: 0;
    animation: fall 3s linear infinite;
}

@keyframes fall {
    to {
        transform: translateY(100vh);
    }
}
</style>
</head>

<body>

<div class="container" id="main">
    <h1>Do you forgive me HER_NAME? 🥺</h1>
    <button class="yes" onclick="yesClicked()">Yes ❤️</button>
    <button class="no" id="noBtn">No 😈</button>
</div>

<audio id="bgMusic" loop>
    <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
</audio>

<script>
const noBtn = document.getElementById("noBtn");
const container = document.getElementById("main");
const music = document.getElementById("bgMusic");

// move NO button
noBtn.addEventListener("mouseover", () => {
    const x = Math.random() * (window.innerWidth - 100);
    const y = Math.random() * (window.innerHeight - 50);
    noBtn.style.left = x + "px";
    noBtn.style.top = y + "px";
});

// floating hearts
function createHearts() {
    setInterval(() => {
        const heart = document.createElement("div");
        heart.className = "heart";
        heart.innerHTML = "💖";
        heart.style.left = Math.random() * 100 + "vw";
        heart.style.fontSize = (20 + Math.random() * 20) + "px";
        document.body.appendChild(heart);

        setTimeout(() => heart.remove(), 5000);
    }, 300);
}

// confetti
function createConfetti() {
    for (let i = 0; i < 100; i++) {
        const conf = document.createElement("div");
        conf.className = "confetti";
        conf.style.left = Math.random() * 100 + "vw";
        conf.style.background = `hsl(${Math.random()*360},100%,50%)`;
        conf.style.animationDuration = (2 + Math.random() * 3) + "s";
        document.body.appendChild(conf);

        setTimeout(() => conf.remove(), 3000);
    }
}

// YES clicked
function yesClicked() {
    music.play();
    createConfetti();

    container.innerHTML = `
        <h1>🎉🎉🎉</h1>
        <h1>I knew you love me HER_NAME ❤️🥹</h1>
    `;

    setTimeout(() => {
        container.innerHTML = `
            <h1>⏳🥺</h1>
            <h1>Wait...</h1>
        `;
    }, 3000);

    setTimeout(() => {
        container.innerHTML = `
            <h1>You love me na? 😚</h1>
            <button class="yes" onclick="finalYes()">Yes 💕</button>
            <button class="no" id="noBtn2">No 😏</button>
        `;

        const noBtn2 = document.getElementById("noBtn2");

        noBtn2.addEventListener("mouseover", () => {
            const x = Math.random() * (window.innerWidth - 100);
            const y = Math.random() * (window.innerHeight - 50);
            noBtn2.style.left = x + "px";
            noBtn2.style.top = y + "px";
        });

    }, 5000);
}

// final yes
function finalYes() {
    createConfetti();
    createHearts();

    container.innerHTML = `
        <h1>Yayyyy!!! 💖💖💖</h1>
        <h1>I love you so much HER_NAME 🥹❤️</h1>
    `;
}
</script>

</body>
</html>
